name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test FileConvert.UnitTests --configuration Release --no-build --verbosity normal

      - name: Setup Playwright
        run: |
          dotnet tool install --global Microsoft.Playwright.CLI
          playwright install chromium

      - name: Run UI tests
        run: dotnet test FileConvert.UiTests --configuration Release --no-build --verbosity normal
        env:
          TEST_URL: https://devfileconversion.z33.web.core.windows.net/
